<div class="card shadow-sm p-3 mb-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h6 class="mb-0">Recent Properties</h6>
    <a href="/broker-properties" class="small text-decoration-none">
      View All
    </a>
  </div>

  {% if recent_properties %}
    <ul class="list-group list-group-flush">
      {% for property in recent_properties %}
        <li class="list-group-item px-0">

          <a href="/broker-property/{{ property.id }}"
             class="d-flex justify-content-between align-items-center text-decoration-none text-dark recent-property-link">

            <div>
              <div class="fw-semibold">
                {{ property.location }}
              </div>
              <div class="small text-muted">
                {{ property.mode }} • {{ property.type }}
              </div>
            </div>

            <div class="fw-semibold">
              {{ property.budget | inr }}
            </div>

          </a>

        </li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="text-muted small">No recent properties</div>
  {% endif %}
</div>
