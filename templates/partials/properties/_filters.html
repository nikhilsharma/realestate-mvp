<div class="mb-3">

  <!-- Listing Status -->
  <div class="mb-3">
    <div class="small text-muted mb-2">Listing Status</div>
    <div class="d-flex flex-wrap gap-2">

      <input type="checkbox" class="btn-check"
             name="status"
             value="Available"
             id="status-available"
             {% if "Available" in status_filters %}checked{% endif %}>
      <label class="btn btn-outline-success btn-sm"
             for="status-available">
        Available
      </label>

      <input type="checkbox" class="btn-check"
             name="status"
             value="Closed"
             id="status-closed"
             {% if "Closed" in status_filters %}checked{% endif %}>
      <label class="btn btn-outline-secondary btn-sm"
             for="status-closed">
        Sold / Rented
      </label>

    </div>
  </div>

  <!-- Mode -->
  <div class="mb-3">
    <div class="small text-muted mb-2">Mode</div>
    <div class="d-flex flex-wrap gap-2">

      <input type="checkbox" class="btn-check"
             name="mode"
             value="Sale"
             id="mode-sale"
             {% if "Sale" in mode_filters %}checked{% endif %}>
      <label class="btn btn-outline-primary btn-sm"
             for="mode-sale">
        Sale
      </label>

      <input type="checkbox" class="btn-check"
             name="mode"
             value="Rent"
             id="mode-rent"
             {% if "Rent" in mode_filters %}checked{% endif %}>
      <label class="btn btn-outline-warning btn-sm"
             for="mode-rent">
        Rent
      </label>

    </div>
  </div>

  <!-- Records -->
  <div>
    <div class="small text-muted mb-2">Records</div>
    <div class="d-flex flex-wrap gap-2">

      <input type="checkbox" class="btn-check"
             name="is_active"
             value="true"
             id="active-true"
             {% if "true" in active_filters %}checked{% endif %}>
      <label class="btn btn-outline-dark btn-sm"
             for="active-true">
        Active
      </label>

      <input type="checkbox" class="btn-check"
             name="is_active"
             value="false"
             id="active-false"
             {% if "false" in active_filters %}checked{% endif %}>
      <label class="btn btn-outline-danger btn-sm"
             for="active-false">
        Archived
      </label>

    </div>
  </div>

</div>
