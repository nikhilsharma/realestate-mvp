{% if page < total_pages %}
<!-- DEBUG: container={{ container_id }} next={{ next_page_url }} -->
<div class="text-center mt-4" id="load-more-container">
  <button
    hx-get="{{ next_page_url }}"
    hx-target="{{ container_id }}"
    hx-swap="beforeend"
    hx-on::after-request="this.closest('div').remove()"
    class="btn btn-outline-dark btn-sm px-4"
  >
    Load More
</button>
</div>
{% endif %}
