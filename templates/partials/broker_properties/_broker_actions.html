<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

  <small class="text-muted">
    Confirmed {{ property.last_confirmed_at.strftime("%d-%m-%Y") if property.last_confirmed_at }}
  </small>

  <div class="d-flex gap-2 flex-wrap justify-content-end">

    <!-- Confirm freshness -->
    <form method="POST"
          action="/broker-property/{{ property.id }}/confirm">
        <button class="btn btn-sm btn-outline-success">
            Confirm
        </button>
    </form>

    <!-- Toggle availability -->
    <form method="POST"
          action="/broker-property/{{ property.id }}/toggle-availability">
        {% if property.is_available %}
            <button class="btn btn-sm btn-outline-warning">
                Mark Unavailable
            </button>
        {% else %}
            <button class="btn btn-sm btn-outline-primary">
                Mark Available
            </button>
        {% endif %}
    </form>

    <!-- Edit property -->
    <a href="/edit-broker-property/{{ property.id }}"
       class="btn btn-sm btn-outline-secondary">
        Edit
    </a>

    <!-- Contact broker -->
    {% if property.broker_contact %}
    <a href="tel:{{ property.broker_contact }}"
       class="btn btn-sm btn-outline-dark">
        Call
    </a>
    {% endif %}

    {% include "partials/property_share_button.html" %}

  </div>

</div>
