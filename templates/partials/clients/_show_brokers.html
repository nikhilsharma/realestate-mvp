{% if client.brokers %}
<div class="mt-3">

    <!-- Compact header -->
    <div class="d-flex justify-content-between align-items-center">
        <small class="text-muted">📞 Brokers</small>

        <button 
            class="btn btn-sm btn-light border"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#brokers-{{ client.id }}"
        >
            Show ▼
        </button>
    </div>

    <!-- Collapsible list -->
    <div class="collapse mt-2" id="brokers-{{ client.id }}">

        {% for broker in client.brokers %}  {# limit to top 3 #}
        <div class="d-flex justify-content-between align-items-center mb-2">

            <div>
                <strong>{{ broker.name }}</strong>
                <div class="text-muted small">
                    <span class="badge bg-light text-dark"> {{ broker.area }} </span>
                </div>
            </div>

            <div class="d-flex gap-2">

                <!-- Call -->
                <a href="tel:{{ broker.phone }}" 
                   class="btn btn-sm btn-outline-dark">
                    📞
                </a>

                <!-- WhatsApp -->
                {% set msg = "Hi, I have a client looking for " ~ client.property_type ~
                             " in " ~ client.location ~ " around ₹" ~ client.budget %}

                <a href="https://wa.me/{{ broker.phone }}?text={{ msg | urlencode }}"
                   target="_blank"
                   class="btn btn-sm btn-success">
                    💬
                </a>

            </div>

        </div>
        {% endfor %}

    </div>

</div>
{% endif %}
