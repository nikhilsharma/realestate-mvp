<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>{% block title %}Urban Bricks & Bonds{% endblock %}</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/ui.css') }}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

<a class="navbar-brand fw-semibold" href="/">
🏢 Urban Bricks & Bonds
</a>

{% if session.get("logged_in") %}

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#mainNavbar">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="mainNavbar">

<div class="ms-auto d-flex flex-column flex-lg-row gap-2">

<a href="/"
class="btn btn-sm {% if request.path == '/' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
Dashboard
</a>

<!-- <a href="/properties"
class="btn btn-sm {% if request.path.startswith('/properties') %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
Properties
</a> -->

<a href="/broker-properties"
class="btn btn-sm {% if request.path.startswith('/broker-properties') %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
Inventory
</a>

<a href="/clients"
class="btn btn-sm {% if request.path.startswith('/clients') %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
Clients
</a>

<a href="/brokers"
class="btn btn-sm {% if request.path.startswith('/brokers') %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
Brokers
</a>

<a href="/logout"
class="btn btn-sm btn-outline-light">
Logout
</a>

</div>

</div>

{% endif %}

</nav>

<small class="text-light ms-2">Property Management</small>

<div class="container py-4">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.10/dist/htmx.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/area_converter.js') }}"></script>
<script src="{{ url_for('static', filename='js/currency_formatter.js') }}"></script>
<script src="{{ url_for('static', filename='js/copy_utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/filters.js') }}"></script>
<script src="{{ url_for('static', filename='js/location_utils.js') }}"></script>
<!-- <script src="{{ url_for('static', filename='js/client_form.js') }}"></script> -->

</body>
</html>
